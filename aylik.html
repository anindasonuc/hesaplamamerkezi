<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesaplama Merkezi</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ece9e6,#ffffff);
    margin:0;
    padding:20px;
}

/* KART */
.kutu{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    margin-bottom:20px;
}

/* BAŞLIK */
h1{
    text-align:center;
    color:#2c3e50;
}

.aciklama{
    text-align:center;
    color:#7f8c8d;
    font-size:14px;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-top:6px;
    border:1px solid #ddd;
    border-radius:10px;
}

/* BUTON */
button{
    width:100%;
    margin-top:15px;
    padding:15px;
    background:linear-gradient(135deg,#6d4c41,#8d6e63);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* SONUÇ */
.sonuc{
    margin-top:15px;
    padding:15px;
    background:#f1f8e9;
    border-left:5px solid #6d4c41;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- 1. KART -->
<div class="kutu">

<h1>💰 Maaş Hesaplama</h1>

<div class="aciklama">Net maaş + izin + fazla mesai</div>

<label>Net Maaş</label>
<input type="number" id="maas">

<label>İzin Günü</label>
<input type="number" id="izin">

<label>Fazla Mesai Saat</label>
<input type="number" id="mesai">

<button onclick="hesapla()">HESAPLA</button>

<div id="sonuc1" class="sonuc"></div>

</div>

<!-- 2. KART -->
<div class="kutu">

<h1>⏱️ Fazla Mesai Hesaplama</h1>

<label>Çalışılan Gün</label>
<input type="number" id="fmGun">

<label>Cumartesi</label>
<input type="number" id="fmCmt">

<label>Pazar</label>
<input type="number" id="fmPaz">

<label>Günlük Saat</label>
<input type="number" id="fmSaat">

<label>Devamsızlık</label>
<input type="number" id="fmDev">

<button onclick="fazlaMesaiHesapla()">HESAPLA</button>

<div id="sonuc2" class="sonuc"></div>

</div>

<script>

/* 1. KART - ESKİ HAL */
function hesapla(){

let maas = Number(document.getElementById("maas").value);
let izin = Number(document.getElementById("izin").value);
let mesai = Number(document.getElementById("mesai").value);

let gunlukUcret = maas / 30;
let saatlikUcret = maas / 225;

let izinSaati = izin * 7.5;

let netMesai = 0;
let kalanIzinSaati = 0;

if(mesai >= izinSaati){
    netMesai = mesai - izinSaati;
}else{
    kalanIzinSaati = izinSaati - mesai;
}

let fazlaMesaiTutari = saatlikUcret * 1.5 * netMesai;
let izinKesintisi = kalanIzinSaati * saatlikUcret;

let toplamMaas = maas + fazlaMesaiTutari - izinKesintisi;

document.getElementById("sonuc1").innerHTML = `
<b>Net Maaş:</b> ${maas.toLocaleString('tr-TR')} TL<br>
<b>Günlük Ücret:</b> ${gunlukUcret.toFixed(2)} TL<br>
<b>Saatlik Ücret:</b> ${saatlikUcret.toFixed(2)} TL<br><br>

<b>Kullanılan İzin:</b> ${izin} Gün (${izinSaati.toFixed(1)} Saat)<br>
<b>Fazla Mesai:</b> ${mesai} Saat<br>
<b>İzinden Sonra Kalan Mesai:</b> ${netMesai.toFixed(1)} Saat<br>
<b>İzin Açığı:</b> ${kalanIzinSaati.toFixed(1)} Saat<br><br>

<b>Fazla Mesai Kazancı:</b> ${fazlaMesaiTutari.toFixed(2)} TL<br>
<b>İzin Kesintisi:</b> ${izinKesintisi.toFixed(2)} TL<br>

<hr>
<h2>Toplam Maaş: ${toplamMaas.toFixed(2)} TL</h2>
`;
}


/* 2. KART */
function fazlaMesaiHesapla(){

let gun = Number(document.getElementById("fmGun").value) || 0;
let cmt = Number(document.getElementById("fmCmt").value) || 0;
let paz = Number(document.getElementById("fmPaz").value) || 0;
let saat = Number(document.getElementById("fmSaat").value) || 0;
let dev = Number(document.getElementById("fmDev").value) || 0;

let netGun = gun - dev;
if(netGun < 0) netGun = 0;

let mola = saat > 7.5 ? 1 : 0.5;
let netSaat = saat - mola;

let toplamSaat = netGun * netSaat;
let normalSaat = netGun * 7.5;

let fazlaMesai = toplamSaat - normalSaat;
if(fazlaMesai < 0) fazlaMesai = 0;

document.getElementById("sonuc2").innerHTML = `
<b>Toplam Fazla Mesai:</b> ${fazlaMesai.toFixed(2)} Saat
`;
}

</script>

</body>
</html>
